name: Daily nerd stats

on:
  schedule:
    # 12:00 AM PST (08:00 UTC). During PDT this runs at 1:00 AM Pacific.
    - cron: "0 8 * * *"
  workflow_dispatch:
    inputs:
      season:
        description: "Season year (defaults to current year)"
        required: false
        type: string

permissions:
  contents: write

jobs:
  aggregate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        working-directory: web
        run: npm ci --omit=optional

      - name: Sync game feeds
        working-directory: web
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          SINCE=$(date -u -d '2 days ago' +%Y-%m-%d)
          echo "Syncing feeds for games since ${SINCE}"
          npm run sync-game-feeds -- --since="$SINCE"

      - name: Aggregate nerd stats
        working-directory: web
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          SEASON="${{ github.event.inputs.season }}"
          if [ -z "$SEASON" ]; then
            SEASON=$(date +%Y)
          fi
          SINCE=$(date -u -d '2 days ago' +%Y-%m-%d)
          echo "Aggregating nerd stats for season ${SEASON} since ${SINCE}"
          npm run aggregate-nerd-stats -- --season="$SEASON" --since="$SINCE"

      - name: Aggregate ballpark hits
        working-directory: web
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          SEASON="${{ github.event.inputs.season }}"
          if [ -z "$SEASON" ]; then
            SEASON=$(date +%Y)
          fi
          SINCE=$(date -u -d '2 days ago' +%Y-%m-%d)
          echo "Aggregating ballpark hits for season ${SEASON} since ${SINCE}"
          npm run aggregate-ballpark-hits -- --season="$SEASON" --since="$SINCE"

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add web/data/nerd-stats web/data/ballpark-hits
          # Per-game caches are local aggregate artifacts; keep them out of git/deploy.
          git reset HEAD -- web/data/nerd-stats/*/games/ 2>/dev/null || true
          if git diff --staged --quiet; then
            echo "No data changes to commit."
            exit 0
          fi
          SEASON="${{ github.event.inputs.season }}"
          if [ -z "$SEASON" ]; then
            SEASON=$(date +%Y)
          fi
          git commit -m "chore: update nerd stats and ballpark hits for ${SEASON} season"
          git push
